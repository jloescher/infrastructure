version: "3.8"

services:
  # Infrastructure Dashboard
  dashboard:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: infrastructure-dashboard
    hostname: infrastructure-dashboard
    # Use host network for Tailscale access
    network_mode: host
    environment:
      - PG_HOST=${PG_HOST:-100.102.220.16}
      - PG_PORT=${PG_PORT:-5000}
      - PG_USER=${PG_USER:-patroni_superuser}
      - PG_PASSWORD=${PG_PASSWORD}
      - REDIS_HOST=${REDIS_HOST:-100.126.103.51}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://100.102.220.16:9090}
      - GRAFANA_URL=${GRAFANA_URL:-http://100.102.220.16:3000}
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASS=${DASHBOARD_PASS:-DbAdmin2026!}
      - SECRET_KEY=${SECRET_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - CLOUDFLARE_API_TOKEN=${CF_API_TOKEN:-}
      - CLOUDFLARE_ZONE_ID=${CF_ZONE_ID:-}
      - CLOUDFLARE_ZONE_NAME=${CF_ZONE_NAME:-}
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-}
      - WEBHOOK_PUBLIC_HOST=${WEBHOOK_PUBLIC_HOST:-hooks.quantyralabs.cc}
      - BASE_DIR=/app
      - SSH_KEY_PATH=/root/.ssh/id_vps
      - LOCAL_TAILSCALE_IP=${LOCAL_TAILSCALE_IP:-}
      - PAAS_DATABASE_PATH=/data/paas.db
      - PAAS_KEY_PATH=/data/vault.key
    volumes:
      # Persistent data (SQLite database + encryption key)
      - dashboard-data:/data
      # SSH key for server access (read-only)
      - ${SSH_KEY_PATH:-/root/.ssh/id_vps}:/root/.ssh/id_vps:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: infrastructure-prometheus
    hostname: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ../configs/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../configs/prometheus/alerts.yml:/etc/prometheus/rules/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    networks:
      - infrastructure
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana - Visualization
  grafana:
    image: grafana/grafana:10.2.2
    container_name: infrastructure-grafana
    hostname: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/
      - GF_INSTALL_PLUGINS=
    volumes:
      - ../configs/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - infrastructure
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Alertmanager - Alert Handling
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: infrastructure-alertmanager
    hostname: alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ../configs/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager-data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - infrastructure
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  infrastructure:
    driver: bridge
    name: infrastructure-network

volumes:
  dashboard-data:
    name: infrastructure-dashboard-data
  prometheus-data:
    name: infrastructure-prometheus-data
  grafana-data:
    name: infrastructure-grafana-data
  alertmanager-data:
    name: infrastructure-alertmanager-data