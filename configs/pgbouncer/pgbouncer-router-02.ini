[databases]
; Write connections - go through HAProxy to primary
quantyra_re = host=100.116.175.9 port=5000 dbname=xotec_re
; Read connections - go through HAProxy to replicas  
quantyra_re_read = host=100.116.175.9 port=5001 dbname=xotec_re
rentalfixer = host=100.116.175.9 port=5000 dbname=rentalfixer
rentalfixer_read = host=100.116.175.9 port=5001 dbname=rentalfixer

[pgbouncer]
listen_addr = 100.116.175.9
listen_port = 6432
unix_socket_dir = /var/run/postgresql
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Transaction pooling - optimal for web apps
pool_mode = transaction

; Connection limits
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3

; Server settings
server_reset_query = DISCARD ALL
server_check_query = SELECT 1
server_check_delay = 30
server_lifetime = 3600
server_idle_timeout = 600

; Query timeout
query_timeout = 300
query_wait_timeout = 120

; Required for pgx driver
ignore_startup_parameters = extra_float_digits,options

; Logging
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

; Admin
admin_users = db_admin
stats_users = db_admin

; TLS
client_tls_sslmode = disable
