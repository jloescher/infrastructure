# ===========================================
# POSTGRESQL REPLICA - re-node-04
# Streaming replica of re-node-01 (primary)
# 8 vCPU, 32GB RAM
# ===========================================
# --- NETWORK ---
listen_addresses = '127.0.0.1,100.115.75.119'
port = 5432
# --- SECURITY ---
password_encryption = scram-sha-256
ssl = on
# --- CONNECTIONS (must be >= primary) ---
max_connections = 200
# --- MEMORY ---
shared_buffers = 8GB
effective_cache_size = 24GB
work_mem = 128MB
maintenance_work_mem = 2GB
huge_pages = try
# --- REPLICATION (must be >= primary) ---
max_wal_senders = 10
max_replication_slots = 10
wal_level = replica
# --- STANDBY SETTINGS ---
hot_standby = on
hot_standby_feedback = on
max_standby_streaming_delay = 30s
max_standby_archive_delay = 30s
# --- PARALLELISM (must be >= primary) ---
max_worker_processes = 8
max_parallel_workers = 8
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4
# --- QUERY PLANNER (NVMe optimized) ---
random_page_cost = 1.1
effective_io_concurrency = 200
maintenance_io_concurrency = 200
seq_page_cost = 1.0
# --- LOGGING ---
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_line_prefix = '%m [%p] %u@%d %r '
log_min_duration_statement = 500
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
# --- STATISTICS ---
track_activities = on
track_counts = on
track_io_timing = on
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
max_locks_per_transaction = 128
