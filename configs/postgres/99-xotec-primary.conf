# ===========================================
# POSTGRESQL TUNING - re-node-01 PRIMARY
# 8 vCPU, 32GB RAM, 640GB NVMe
# ===========================================
# --- NETWORK ---
listen_addresses = '127.0.0.1,100.126.103.51'
port = 5432
# --- SECURITY ---
password_encryption = scram-sha-256
ssl = on
# --- MEMORY (32GB system, ~4GB for DragonflyDB) ---
shared_buffers = 8GB
effective_cache_size = 20GB
work_mem = 128MB                    # Increased for sorts/hashes during bulk import
maintenance_work_mem = 2GB         # Increased for VACUUM/CREATE INDEX
huge_pages = try
# --- CONNECTIONS ---
max_connections = 200
# --- WAL & CHECKPOINTS ---
wal_level = replica
wal_buffers = 64MB
max_wal_size = 8GB                 # Increased for bulk import
min_wal_size = 1GB
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
wal_compression = lz4
synchronous_commit = off           # SAFE for single-primary, speeds bulk import
# --- REPLICATION ---
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 8GB                # Fixed: was missing MB suffix!
hot_standby = on
# --- QUERY PLANNER (NVMe optimized) ---
random_page_cost = 1.1
effective_io_concurrency = 200
maintenance_io_concurrency = 200
seq_page_cost = 1.0
# --- PARALLELISM ---
max_worker_processes = 8
max_parallel_workers_per_gather = 4
max_parallel_maintenance_workers = 4
max_parallel_workers = 6
# --- AUTOVACUUM (aggressive for bulk import) ---
autovacuum = on
autovacuum_max_workers = 4         # Increased
autovacuum_naptime = 20s           # More frequent checks
autovacuum_vacuum_scale_factor = 0.05   # Vacuum sooner
autovacuum_analyze_scale_factor = 0.02  # Analyze sooner
autovacuum_vacuum_cost_delay = 2ms
autovacuum_vacuum_cost_limit = 800      # More aggressive
# --- BACKGROUND WRITER ---
bgwriter_delay = 100ms             # More frequent writes
bgwriter_lru_maxpages = 200
bgwriter_lru_multiplier = 4.0
# --- LOGGING ---
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_line_prefix = '%m [%p] %u@%d %r '
log_min_duration_statement = 500   # Log queries > 500ms
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 0
# --- STATISTICS ---
track_activities = on
track_counts = on
track_io_timing = on
track_functions = pl
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
# --- LOCK MANAGEMENT ---
deadlock_timeout = 500ms           # Faster deadlock detection during bulk import
max_locks_per_transaction = 128    # Increased for partitioned tables
# --- PARTITIONING ---
enable_partition_pruning = on
constraint_exclusion = partition
