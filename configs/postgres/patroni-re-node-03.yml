scope: quantyra_pg
namespace: /service/
name: re-node-03

restapi:
  listen: 0.0.0.0:8008
  connect_address: 100.114.117.46:8008

etcd3:
  hosts: 100.102.220.16:2379,100.116.175.9:2379,100.115.75.119:2379

bootstrap:
  dcs:
    ttl: 30
    loop_wait: 10
    retry_timeout: 10
    maximum_lag_on_failover: 1048576
    failsafe_mode: true
    postgresql:
      use_pg_rewind: true
      use_slots: true
      parameters:
        wal_level: replica
        hot_standby: "on"
        max_connections: 200
        max_wal_senders: 10
        max_replication_slots: 10
        wal_keep_size: 8GB
        shared_buffers: 8GB
        effective_cache_size: 24GB
        maintenance_work_mem: 2GB
        work_mem: 64MB
        synchronous_commit: "off"
        unix_socket_directories: /var/run/postgresql
        listen_addresses: '127.0.0.1,100.114.117.46'
      slots:
        re_node_01:
          type: physical
        re_node_03:
          type: physical
        re_node_04:
          type: physical

