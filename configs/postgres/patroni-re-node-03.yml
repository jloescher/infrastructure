  listen: 127.0.0.1,100.114.117.46:5432
  connect_address: 100.114.117.46:5432
  data_dir: /var/lib/postgresql/18/main
  config_dir: /etc/postgresql/18/main
  bin_dir: /usr/lib/postgresql/18/bin
  pgpass: /var/lib/postgresql/.pgpass_patroni

  authentication:
    superuser:
      username: patroni_superuser
      password: 2e7vBpaaVK4vTJzrKebC
    replication:
      username: patroni_repl
      password: uxNZhqARqvmqbbGZ2XnD
    rewind:
      username: patroni_rewind
      password: z6mR2xLosQavzjPbE9Uk

