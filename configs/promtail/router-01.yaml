server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://100.102.220.16:3100/loki/api/v1/push

scrape_configs:
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: router-01
          __path__: /var/log/syslog

  - job_name: auth
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth
          host: router-01
          __path__: /var/log/auth.log

  - job_name: haproxy
    static_configs:
      - targets:
          - localhost
        labels:
          job: haproxy
          host: router-01
          __path__: /var/log/haproxy.log

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost
        labels:
          job: prometheus
          host: router-01
          __path__: /var/log/prometheus.log

  - job_name: alertmanager
    static_configs:
      - targets:
          - localhost
        labels:
          job: alertmanager
          host: router-01
          __path__: /var/log/alertmanager.log

  - job_name: dashboard
    static_configs:
      - targets:
          - localhost
        labels:
          job: dashboard
          host: router-01
          __path__: /var/log/dashboard.log