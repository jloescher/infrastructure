# System limits for high-performance applications

# File descriptors
* soft nofile 65535
* hard nofile 65535
root soft nofile 65535
root hard nofile 65535

# Process limits
* soft nproc 65535
* hard nproc 65535
root soft nproc 65535
root hard nproc 65535

# Memlock (for huge pages)
* soft memlock unlimited
* hard memlock unlimited