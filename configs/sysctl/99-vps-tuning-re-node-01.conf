# VPS-Tuned Kernel Settings (Conservative)
# Applied to all servers

# === TCP Settings ===
# Increase local port range for outgoing connections
net.ipv4.ip_local_port_range = 32768 65535

# Faster connection recovery
net.ipv4.tcp_fin_timeout = 30
net.ipv4.tcp_tw_reuse = 1

# TCP keepalive (detect dead connections faster)
net.ipv4.tcp_keepalive_time = 600
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 5

# Moderate TCP buffer sizes (VPS-appropriate)
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216

# === Connection Tracking ===
# For firewalls and HAProxy
net.netfilter.nf_conntrack_max = 262144
net.netfilter.nf_conntrack_tcp_timeout_time_wait = 30

# === File Descriptors ===
fs.file-max = 2097152

# === Virtual Memory ===
# Reduce swap usage (VPS often has limited I/O)
vm.swappiness = 10
vm.dirty_ratio = 15
vm.dirty_background_ratio = 5

# === Security ===
# Reduce attack surface
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1
net.ipv4.icmp_echo_ignore_broadcasts = 1
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0