# Database server settings (PostgreSQL, Redis)
# Applied on top of 99-vps-tuning.conf

# === Shared Memory (PostgreSQL needs this) ===
kernel.shmmax = 68719476736
kernel.shmall = 4294967296

# === Semaphore limits (PostgreSQL connections) ===
# Format: semmsl semmns semopm semmni
kernel.sem = 250 32000 100 256

# === Huge Pages (already configured, included for reference) ===
# vm.nr_hugepages = 4256  # Set in 99-hugepages.conf

# === Dirty page handling (database write performance) ===
vm.dirty_background_bytes = 67108864
vm.dirty_bytes = 536870912

# === Disable NUMA balancing (VPS typically single NUMA node) ===
kernel.numa_balancing = 0