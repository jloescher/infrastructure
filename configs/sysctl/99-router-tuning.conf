# Router-specific settings (HAProxy, PgBouncer)
# Applied on top of 99-vps-tuning.conf

# === SYN Backlog (for high connection rates) ===
net.ipv4.tcp_max_syn_backlog = 4096
net.core.somaxconn = 4096

# === Connection Tracking (higher for routers) ===
net.netfilter.nf_conntrack_max = 524288

# === TCP Syncookies (DDoS protection) ===
net.ipv4.tcp_syncookies = 1
net.ipv4.tcp_synack_retries = 2

# === Faster TIME_WAIT recycling ===
net.ipv4.tcp_max_tw_buckets = 65536