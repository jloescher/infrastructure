http:
  routers:
    dokploy-router-app:
      rule: Host(`deploy.quantyralabs.cc`)
      service: dokploy-service-app
      entryPoints:
        - web
      middlewares:
        - redirect-to-https
    dokploy-router-app-secure:
      rule: Host(`deploy.quantyralabs.cc`)
      service: dokploy-service-app
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
  services:
    dokploy-service-app:
      loadBalancer:
        servers:
          - url: http://10.0.1.7:3000
        passHostHeader: true
