    deploy_workflow: "name: Deploy rentalfixer\n\non:\n  push:\n    branches:\n  \
      \    - main\n      - staging\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n\
      \    if: github.ref == 'refs/heads/main'\n    steps:\n      - uses: actions/checkout@v4\n\
      \      - name: Install Dependencies\n        run: composer install --no-dev\
      \ --optimize-autoloader\n      - name: Build Assets\n        run: |\n      \
