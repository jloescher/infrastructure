      \            php artisan view:cache\n            sudo systemctl restart rentalfixer\n\
      \n  deploy-re-node-02:\n    runs-on: ubuntu-latest\n    needs: build\n    steps:\n\
      \      - name: Deploy to re-node-02\n        uses: appleboy/ssh-action@master\n\
      \        with:\n          host: ${{ secrets.DEPLOY_HOST }}\n          username:\
      \ ${{ secrets.DEPLOY_USER }}\n          password: ${{ secrets.DEPLOY_PASSWORD\
      \ }}\n          script: |\n            cd /opt/apps/rentalfixer\n          \
      \  git pull origin ${{ github.ref_name }}\n            composer install --no-dev\
      \ --optimize-autoloader\n            php artisan migrate --force\n         \
      \   php artisan config:cache\n            php artisan route:cache\n        \
      \    php artisan view:cache\n            sudo systemctl restart rentalfixer\n\
      \n  staging:\n    runs-on: ubuntu-latest\n    environment: staging\n    if:\
      \ github.ref == 'refs/heads/staging'\n    steps:\n      - uses: actions/checkout@v4\n\
      \      - name: Install Dependencies\n        run: composer install --no-dev\
      \ --optimize-autoloader\n      - name: Build Assets\n        run: |\n      \
      \    npm ci\n          npm run build\n      - name: Optimize\n        run: |\n\
      \          php artisan config:cache\n          php artisan route:cache\n   \
      \       php artisan view:cache\n      - name: Deploy to Staging\n        uses:\
      \ appleboy/ssh-action@master\n        with:\n          host: ${{ secrets.DEPLOY_HOST\
      \ }}\n          username: ${{ secrets.DEPLOY_USER }}\n          password: ${{\
      \ secrets.DEPLOY_PASSWORD }}\n          script: |\n            cd /opt/apps/rentalfixer-staging\n\
      \            git pull origin ${{ github.ref_name }}\n            composer install\
      \ --no-dev --optimize-autoloader 2>/dev/null || true\n            npm ci &&\
      \ npm run build 2>/dev/null || true\n            php artisan migrate --force\
      \ 2>/dev/null || true\n            sudo systemctl restart rentalfixer-staging\
      \ 2>/dev/null || sudo systemctl reload php8.5-fpm\n"
