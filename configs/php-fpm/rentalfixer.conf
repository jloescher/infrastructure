[rentalfixer]
user = www-data
group = www-data
listen = /run/php/php8.5-fpm-rentalfixer.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Process Manager (Production - Higher limits)
pm = dynamic
pm.max_children = 40
pm.start_servers = 5
pm.min_spare_servers = 3
pm.max_spare_servers = 10
pm.max_requests = 1000

; Slowlog for debugging performance issues
slowlog = /var/log/php8.5-fpm/rentalfixer-slow.log
request_slowlog_timeout = 5s

; Logging
php_admin_value[error_log] = /var/log/php8.5-fpm/rentalfixer-error.log
php_admin_flag[log_errors] = on

; Sessions
php_value[session.save_handler] = files
php_value[session.save_path] = /var/lib/php/sessions
php_value[soap.wsdl_cache_dir] = /var/lib/php/wsdlcache

; Status endpoint for monitoring
pm.status_path = /status