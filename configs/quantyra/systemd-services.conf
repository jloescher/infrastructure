# XOTEC Data Layer - Systemd Service Definitions
# Location: /etc/systemd/system/quantyra-*.service on re-db

# =====================================================
# quantyra-app-blue.service - HTTP Server (Blue)
# =====================================================
[Unit]
Description=XOTEC Data Layer - HTTP Server (Blue)
After=network.target
Wants=network-online.target

[Service]
Type=simple
User=deploy
Group=deploy
WorkingDirectory=/opt/quantyra-datalayer
EnvironmentFile=/opt/quantyra-datalayer/secrets.env

ExecStart=/opt/quantyra-datalayer/bin/app
Restart=on-failure
RestartSec=5s
TimeoutStopSec=30s

# Non-sensitive environment variables
Environment="ENV=production"
Environment="HTTP_ADDR=:8001"
Environment="APP_NAME=XOTEC Data Layer"
Environment="APP_VERSION=96236376502ef0bf7075bdb64471ecfc49ca293e"

# MLS Grid API (non-sensitive config only)
Environment="MLSGRID_API_URL=https://api.mlsgrid.com/v2"
Environment="MLSGRID_MAX_RPS=2"
Environment="MLSGRID_ORIGINATING_SYSTEM_NAME=mfrmls"
Environment="MLS_DATA_SOURCE=live"

# Security hardening
PrivateTmp=true
NoNewPrivileges=true
ProtectSystem=strict
ProtectHome=true

[Install]
WantedBy=multi-user.target

