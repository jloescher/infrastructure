# Redis Sentinel Configuration
# Place on routers at /etc/redis/sentinel.conf

port 26379
daemonize no
pidfile /var/run/redis/redis-sentinel.pid
logfile /var/log/redis/redis-sentinel.log
dir /var/lib/redis

# Master configuration
# Master name: quantyra_redis
# Master address: re-node-01 (100.126.103.51:6379)

sentinel monitor quantyra_redis 100.126.103.51 6379 2
sentinel down-after-milliseconds quantyra_redis 5000
sentinel failover-timeout quantyra_redis 60000
sentinel parallel-syncs quantyra_redis 1

# Authentication (use the same password as Redis)
sentinel auth-pass quantyra_redis CcPUa3nvcxHtyNYjztbDyfCCuhgix78novmBDNGk

# Announce IP and port (Tailscale IPs)
# router-01
# sentinel announce-ip 100.102.220.16
# sentinel announce-port 26379

# Logging
loglevel notice

# Protected mode
protected-mode no

# Bind to Tailscale interface
bind 0.0.0.0