# HAProxy Configuration - router-02
# Source: Live configuration captured 2026-03-15
# This file should be kept in sync with /etc/haproxy/haproxy.cfg on router-02

global
    log /dev/log local0
    log /dev/log local1 notice
    user haproxy
    group haproxy
    daemon
    maxconn 50000
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners

defaults
    log global
    option dontlognull
    timeout connect 5s
    timeout client 60s
    timeout server 60s
    retries 3

# Prometheus metrics endpoint
frontend haproxy_metrics
    bind :8405
    mode http
    http-request use-service prometheus-exporter if { path /metrics }
    no log

# PostgreSQL Write (Primary)
frontend pg_rw
    bind 100.116.175.9:5000
    mode tcp
    default_backend pg_primary

backend pg_primary
    mode tcp
    option httpchk GET /primary
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server re-node-01 100.126.103.51:5432 check port 8008
    server re-node-03 100.114.117.46:5432 check port 8008
    server re-node-04 100.115.75.119:5432 check port 8008

# PostgreSQL Read (Replicas)
frontend pg_ro
    bind 100.116.175.9:5001
    mode tcp
    default_backend pg_replicas

backend pg_replicas
    mode tcp
    balance roundrobin
    option httpchk GET /replica
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server re-node-03 100.114.117.46:5432 check port 8008
    server re-node-04 100.115.75.119:5432 check port 8008
    server re-node-01 100.126.103.51:5432 check port 8008 backup

# Web HTTP
frontend web_http
    bind :80
    mode http
    option forwardfor
    default_backend apps_http

backend apps_http
    mode http
    balance roundrobin
    option httpchk GET /
    http-check expect status 200-399
    default-server inter 3s fall 3 rise 2
    server app1 100.92.26.38:80 check
    server app2 100.101.39.22:80 check

# Web HTTPS (TCP passthrough)
frontend web_https
    bind :443
    mode tcp
    default_backend apps_https

backend apps_https
    mode tcp
    balance roundrobin
    option tcp-check
    default-server inter 3s fall 3 rise 2
    server app1 100.92.26.38:443 check
    server app2 100.101.39.22:443 check