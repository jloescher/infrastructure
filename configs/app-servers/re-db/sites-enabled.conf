server {
    listen 9114;
    server_name localhost;
    
    location /stub_status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        allow 100.102.220.16;
        allow 100.116.175.9;
        deny all;
    }
}
server {
    listen 8100;
    server_name _;
    root /opt/apps/rentalfixer/public;
    index index.php;

    # Trust proxies (HAProxy and Cloudflare)
    set_real_ip_from 100.92.26.38;
    set_real_ip_from 100.89.130.19;
    set_real_ip_from 100.102.220.16;
    set_real_ip_from 100.116.175.9;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.5-fpm-rentalfixer.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_param REMOTE_ADDR $realip_remote_addr;
    }

    location ~ /\.ht {
        deny all;
    }
}
server {
    listen 9200;
    server_name _;
    root /opt/apps/rentalfixer-staging/public;
    index index.php;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.5-fpm-rentalfixer-staging.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

