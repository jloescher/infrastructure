version: '3.8'

services:
  paas:
    build:
      context: .
      dockerfile: Dockerfile
    image: quantyra/paas:latest
    container_name: quantyra-paas
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - paas-data:/data
    environment:
      # Required: GitHub token for Gist sync
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      # Optional: Existing Gist ID to restore from
      - GIST_ID=${GIST_ID:-}
      # Optional: Dashboard credentials
      - DASHBOARD_USER=${DASHBOARD_USER:-admin}
      - DASHBOARD_PASS=${DASHBOARD_PASS:-}
      # Optional: Database connection for managing external clusters
      - PG_HOST=${PG_HOST:-}
      - PG_PORT=${PG_PORT:-5000}
      - PG_USER=${PG_USER:-}
      - PG_PASSWORD=${PG_PASSWORD:-}
      # Optional: Redis connection
      - REDIS_HOST=${REDIS_HOST:-}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # Optional: Cloudflare API
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.quantyra.paas.description=Quantyra PaaS Dashboard"

volumes:
  paas-data:
    driver: local
    name: quantyra-paas-data