name: Deploy Application

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      app_name:
        description: 'Application to deploy'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
      
      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          APP_NAME: ${{ github.event.inputs.app_name || 'web-app' }}
          ENVIRONMENT: ${{ github.event.inputs.environment || 'production' }}
        run: |
          ssh $DEPLOY_USER@$DEPLOY_HOST << 'ENDSSH'
            set -e
            
            APP_NAME="${{ env.APP_NAME }}"
            ENVIRONMENT="${{ env.ENVIRONMENT }}"
            DEPLOY_DIR="/opt/apps/$APP_NAME"
            
            echo "Deploying $APP_NAME to $ENVIRONMENT..."
            
            cd $DEPLOY_DIR
            
            # Pull latest images
            docker-compose pull
            
            # Restart services
            docker-compose up -d --remove-orphans
            
            # Health check
            sleep 10
            curl -f http://localhost:3000/health || exit 1
            
            echo "Deployment completed successfully!"
          ENDSSH
      
      - name: Notify on success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ Deployment successful: ${{ github.event.inputs.app_name }} to ${{ github.event.inputs.environment }}\"}" \
            ${{ secrets.SLACK_WEBHOOK }}
      
      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ Deployment failed: ${{ github.event.inputs.app_name }} to ${{ github.event.inputs.environment }}\"}" \
            ${{ secrets.SLACK_WEBHOOK }}

  rollback:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.rollback == 'true'
    environment: ${{ github.event.inputs.environment || 'production' }}
    
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Rollback deployment
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          APP_NAME: ${{ github.event.inputs.app_name }}
        run: |
          ssh $DEPLOY_USER@$DEPLOY_HOST << 'ENDSSH'
            set -e
            
            APP_NAME="${{ env.APP_NAME }}"
            DEPLOY_DIR="/opt/apps/$APP_NAME"
            
            echo "Rolling back $APP_NAME..."
            
            cd $DEPLOY_DIR
            
            # Get previous image
            PREVIOUS_IMAGE=$(docker images --format "{{.Repository}}:{{.Tag}}" | grep $APP_NAME | head -2 | tail -1)
            
            # Rollback
            docker-compose down
            docker tag $PREVIOUS_IMAGE $APP_NAME:latest
            docker-compose up -d
            
            echo "Rollback completed!"
          ENDSSH