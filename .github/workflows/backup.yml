name: Scheduled Backups

on:
  schedule:
    # Daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Backup type'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - postgresql
          - redis

jobs:
  backup-postgresql:
    runs-on: ubuntu-latest
    if: github.event.inputs.backup_type == 'all' || github.event.inputs.backup_type == 'postgresql' || github.event_name == 'schedule'
    
    strategy:
      matrix:
        host:
          - re-node-01
          - re-node-03
          - re-node-04
    
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Run PostgreSQL backup
        env:
          BACKUP_HOST: ${{ matrix.host }}
          S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
        run: |
          ssh root@${{ secrets[format('{0}_IP', matrix.host)] }} << 'ENDSSH'
            set -e
            
            export S3_BUCKET="${{ secrets.BACKUP_S3_BUCKET }}"
            export SLACK_WEBHOOK="${{ secrets.SLACK_WEBHOOK }}"
            
            /usr/local/bin/postgres_backup.sh full
            
            echo "PostgreSQL backup completed on $(hostname)"
          ENDSSH
      
      - name: Notify on success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ PostgreSQL backup successful on ${{ matrix.host }}\"}" \
            ${{ secrets.SLACK_WEBHOOK }}
      
      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ PostgreSQL backup failed on ${{ matrix.host }}\"}" \
            ${{ secrets.SLACK_WEBHOOK }}

  backup-redis:
    runs-on: ubuntu-latest
    if: github.event.inputs.backup_type == 'all' || github.event.inputs.backup_type == 'redis' || github.event_name == 'schedule'
    
    strategy:
      matrix:
        host:
          - re-node-01
          - re-node-03
    
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Run Redis backup
        env:
          BACKUP_HOST: ${{ matrix.host }}
          S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
        run: |
          ssh root@${{ secrets[format('{0}_IP', matrix.host)] }} << 'ENDSSH'
            set -e
            
            export S3_BUCKET="${{ secrets.BACKUP_S3_BUCKET }}"
            export SLACK_WEBHOOK="${{ secrets.SLACK_WEBHOOK }}"
            
            /usr/local/bin/redis_backup.sh
            
            echo "Redis backup completed on $(hostname)"
          ENDSSH
      
      - name: Notify on success
        if: success()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ Redis backup successful on ${{ matrix.host }}\"}" \
            ${{ secrets.SLACK_WEBHOOK }}
      
      - name: Notify on failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ Redis backup failed on ${{ matrix.host }}\"}" \
            ${{ secrets.SLACK_WEBHOOK }}

  sync-to-s3:
    runs-on: ubuntu-latest
    needs: [backup-postgresql, backup-redis]
    if: always() && (needs.backup-postgresql.result == 'success' || needs.backup-redis.result == 'success')
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Sync backups to S3
        run: |
          aws s3 sync /backup s3://${{ secrets.BACKUP_S3_BUCKET }}/infrastructure/ \
            --storage-class STANDARD_IA \
            --delete

  health-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run health check
        run: |
          # Check critical endpoints
          curl -f https://grafana.quantyra.com/api/health || exit 1
          curl -f https://api.quantyra.com/health || exit 1
          
          # Check PostgreSQL endpoints
          nc -zv ${{ secrets.ROUTER_01_IP }} 5000 || exit 1
          nc -zv ${{ secrets.ROUTER_01_IP }} 5001 || exit 1
          
          echo "Health check passed"

  cleanup-old-backups:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Remove old backups from S3
        run: |
          # Remove backups older than 30 days
          aws s3 ls s3://${{ secrets.BACKUP_S3_BUCKET }}/infrastructure/ | \
            awk '{print $2}' | \
            while read prefix; do
              aws s3 ls s3://${{ secrets.BACKUP_S3_BUCKET }}/infrastructure/$prefix --recursive | \
                awk '{print $4}' | \
                while read file; do
                  date=$(echo $file | grep -oE '[0-9]{8}')
                  if [ ! -z "$date" ]; then
                    file_date=$(date -d "$date" +%s)
                    cutoff_date=$(date -d "30 days ago" +%s)
                    if [ $file_date -lt $cutoff_date ]; then
                      aws s3 rm s3://${{ secrets.BACKUP_S3_BUCKET }}/infrastructure/$file
                    fi
                  fi
                done
            done