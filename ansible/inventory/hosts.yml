          hostname: router-02
          os:
            distribution: Ubuntu
            version: "24.04.4 LTS"
            codename: noble
            kernel: 6.8.0-85-generic
          spec:
            vcpus: 2
            cpu_model: "Intel Xeon Silver 4216 @ 2.10GHz"
            ram_gb: 8
            storage_gb: 160
            storage_type: ssd
            disk_used_gb: 4.2
            disk_avail_gb: 146
            swap_gb: 0
          server_roles:
            - haproxy
            - etcd
            - redis_sentinel
            - secondary_router
            - node_exporter
          services:
            haproxy:
              version: "2.8.16"
              status: running
              stats_port: 8405
              pg_write_port: 5000
              pg_read_port: 5001
              web_http_port: 80
              web_https_port: 443
            node_exporter:
              status: running
              port: 9100
          security:
            ufw: active
            ssh_hardening_required: true

    app_servers:
      hosts:
        re-db:
          ansible_host: 100.92.26.38
          tailscale_ip: 100.92.26.38
          public_ip: 208.87.128.115
          ipv6: 2602:ff16:3:0:1:446:0:1
          hostname: re-db
          os:
            distribution: Ubuntu
            version: "24.04.3 LTS"
            codename: noble
            kernel: 6.8.0-90-generic
          spec:
            vcpus: 12
            cpu_model: "Intel Xeon Silver 4216 @ 2.10GHz"
            ram_gb: 48
            storage_gb: 720
            storage_type: nvme
            disk_used_gb: 15
            disk_avail_gb: 658
            swap_gb: 0
          server_roles:
            - web_app
            - api
            - background_workers
          services:
            docker:
              status: not_installed
            web:
              status: running
              http_port: 80
              https_port: 443
              app_port: 8001
              prometheus_port: 9090
          security:
            ufw: active
          deployment:
            docker_required: true

        re-node-02:
          ansible_host: 100.101.39.22
          tailscale_ip: 100.101.39.22
          public_ip: 23.29.118.8
          ipv6: 2602:ff16:3:1299::1
          hostname: re-node-02
          os:
            distribution: Ubuntu
            version: "24.04.3 LTS"
            codename: noble
            kernel: 6.8.0-90-generic
          spec:
            vcpus: 12
            cpu_model: "Intel Xeon Silver 4216 @ 2.10GHz"
            ram_gb: 48
            storage_gb: 720
            storage_type: nvme
            disk_used_gb: 6.3
            disk_avail_gb: 667
            swap_gb: 0
            uptime_days: 63
          server_roles:
            - web_app
            - api
            - background_workers
          services:
            docker:
              status: not_installed
            web:
              status: running
              http_port: 80
              https_port: 443
          security:
            ufw: active
          deployment:
            docker_required: true

      vars:
        ansible_ssh_private_key_file: ~/.ssh/id_vps

    postgres_cluster:
      hosts:
        re-node-01:
        re-node-03:
        re-node-04:
      vars:
        patroni_scope: quantyra_pg
        postgres_version: 18
        postgres_version_full: "18.3"
        haproxy_write_port: 5000
        haproxy_read_port: 5001
        postgres_max_connections: 300
        postgres_shared_buffers: 8GB
        postgres_effective_cache_size: 24GB
        postgres_maintenance_work_mem: 2GB
        postgres_work_mem: 64MB
        postgres_wal_keep_size: 8GB

    redis_cluster:
      hosts:
        re-node-01:
        re-node-03:
      vars:
        redis_port: 6379
        redis_maxmemory: 4GB
        redis_maxmemory_policy: allkeys-lru
        redis_requirepass: true
        redis_master: re-node-01

    monitoring:
      hosts:
        router-01:
      vars:
        prometheus_retention: 30d
        prometheus_port: 9090
        grafana_port: 3000
        alertmanager_port: 9093
        node_exporter_port: 9100
        postgres_exporter_port: 9187

    haproxy:
      hosts:
        router-01:
        router-02:
      vars:
        haproxy_version: "2.8"
        haproxy_stats_port: 8404

    etcd:
      hosts:
        router-01:
        router-02:
        re-node-04:
      vars:
        etcd_version: "3.6.8"
        etcd_client_port: 2379
        etcd_peer_port: 2380
        etcd_cluster_token: "quantyra-etcd-cluster"

  vars:
    ansible_user: root
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
    tailscale_network: true
    tailscale_cidr: 100.64.0.0/10
    provider: ssd_nodes
    timezone: UTC
    ntp_service: chrony

    backup:
      postgres_enabled: false
      redis_enabled: false
      s3_enabled: false
      local_dir: /backup
      retention_days: 30

    monitoring_endpoints:
      prometheus: "http://100.102.220.16:9090"
      grafana: "http://100.102.220.16:3000"
      alertmanager: "http://100.102.220.16:9093"

    database_endpoints:
      postgres_write_primary: "100.102.220.16:5000"
      postgres_read_primary: "100.102.220.16:5001"
      postgres_write_secondary: "100.116.175.9:5000"
      postgres_read_secondary: "100.116.175.9:5001"
      redis_master: "100.126.103.51:6379"
      redis_replica: "100.114.117.46:6379"
      redis_write_router1: "100.102.220.16:6379"
      redis_read_router1: "100.102.220.16:6380"
      redis_write_router2: "100.116.175.9:6379"
      redis_read_router2: "100.116.175.9:6380"
      redis_sentinel_router1: "100.102.220.16:26379"
      redis_sentinel_router2: "100.116.175.9:26379"