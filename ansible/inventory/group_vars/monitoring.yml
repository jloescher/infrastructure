---
# Monitoring configuration (discovered from live systems on router-01)

# HAProxy
haproxy_version: "2.8"
haproxy_config_dir: /etc/haproxy
haproxy_stats_port: 8404
haproxy_stats_user: admin
haproxy_stats_password: "{{ vault_haproxy_stats_password }}"
haproxy_maxconn: 50000

# HAProxy PostgreSQL routing
haproxy_pg_write_port: 5000
haproxy_pg_read_port: 5001
haproxy_pg_check_inter: 3s
haproxy_pg_check_fall: 3
haproxy_pg_check_rise: 2

# HAProxy web routing (on router-02)
haproxy_web_http_port: 80
haproxy_web_https_port: 443

# etcd
etcd_version: "3.5"
etcd_port: 2379
etcd_peer_port: 2380
etcd_data_dir: /var/lib/etcd
etcd_config_dir: /etc/etcd

# Prometheus
prometheus_version: "2.48.0"
prometheus_port: 9090
prometheus_config_dir: /etc/prometheus
prometheus_data_dir: /var/lib/prometheus
prometheus_retention: 30d
prometheus_retention_size: 10GB

# Grafana
grafana_version: "10.2.0"
grafana_port: 3000
grafana_config_dir: /etc/grafana
grafana_data_dir: /var/lib/grafana
grafana_admin_user: admin
grafana_admin_password: "{{ vault_grafana_admin_password }}"

# Alertmanager
alertmanager_enabled: true
alertmanager_port: 9093
alertmanager_config_dir: /etc/alertmanager

# Exporters
node_exporter_version: "1.7.0"
node_exporter_port: 9100
postgres_exporter_version: "0.12.0"
postgres_exporter_port: 9187
redis_exporter_version: "1.55.0"
redis_exporter_port: 9121

# Backup configuration (not yet deployed)
monitoring_backup_enabled: false
monitoring_backup_dir: /backup/monitoring
monitoring_backup_retention_days: 30

# Current HAProxy backend status
haproxy_backends:
  postgres_write:
    - name: re-node-01
      address: 100.126.103.51:5432
      check_port: 8008
    - name: re-node-03
      address: 100.114.117.46:5432
      check_port: 8008
    - name: re-node-04
      address: 100.115.75.119:5432
      check_port: 8008
  postgres_read:
    - name: re-node-03
      address: 100.114.117.46:5432
      check_port: 8008
    - name: re-node-04
      address: 100.115.75.119:5432
      check_port: 8008
    - name: re-node-01
      address: 100.126.103.51:5432
      check_port: 8008
      backup: true
  web_http:
    - name: app1
      address: 100.92.26.38:80
    - name: app2
      address: 100.101.39.22:80
  web_https:
    - name: app1
      address: 100.92.26.38:443
    - name: app2
      address: 100.101.39.22:443