---
# Redis configuration (discovered from live systems)
redis_version: 7
redis_port: 6379
redis_bind_address: "{{ tailscale_ip }}"
redis_data_dir: /var/lib/redis
redis_config_dir: /etc/redis
redis_logfile: /var/log/redis/redis-server.log

# Redis memory management (current values)
redis_maxmemory: 4GB
redis_maxmemory_policy: allkeys-lru
redis_maxmemory_samples: 5
redis_maxclients: 10000

# Redis persistence (current values)
redis_save_enabled: true
redis_save_intervals:
  - "900 1"
  - "300 10"
  - "60 10000"
redis_appendonly: true
redis_appendfilename: appendonly.aof

# Redis replication (current topology)
redis_replication_enabled: true
redis_master_host: 100.126.103.51
redis_master_port: 6379
redis_replica_read_only: "yes"
redis_repl_diskless_sync: "yes"
redis_repl_backlog_size: 64mb

# Redis security (password auth enabled)
redis_requirepass: true
redis_protected_mode: "yes"
redis_renamed_commands:
  CONFIG: '""'
  FLUSHDB: '""'
  FLUSHALL: '""'
  KEYS: '""'
  SHUTDOWN: "SHUTDOWN_{{ inventory_hostname }}"

# Redis Sentinel (not yet configured)
sentinel_enabled: false
sentinel_port: 26379
sentinel_master_name: quantyra_redis
sentinel_quorum: 2
sentinel_down_after_milliseconds: 5000
sentinel_failover_timeout: 60000

# Current topology
redis_nodes:
  master:
    name: re-node-01
    tailscale_ip: 100.126.103.51
    port: 6379
  replicas:
    - name: re-node-03
      tailscale_ip: 100.114.117.46
      port: 6379

# Backup configuration (not yet deployed)
redis_backup_enabled: false
redis_backup_dir: /backup/redis
redis_backup_retention_days: 30