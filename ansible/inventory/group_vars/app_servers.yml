---
# Application server configuration (discovered from live systems)

# Docker (not installed - applications run as systemd services)
docker_enabled: false
docker_compose_version: "2.24.0"
docker_install_required: false

# Application deployment
app_deploy_user: deploy
app_deploy_dir: /opt/apps
app_log_dir: /var/log/apps

# Database connections (via HAProxy)
postgres_write_host: 100.102.220.16
postgres_write_port: 5000
postgres_read_host: 100.102.220.16
postgres_read_port: 5001
postgres_write_secondary_host: 100.116.175.9
postgres_write_secondary_port: 5000
postgres_read_secondary_host: 100.116.175.9
postgres_read_secondary_port: 5001

# Redis connections
redis_master_host: 100.126.103.51
redis_replica_host: 100.114.117.46
redis_port: 6379

# Environment
node_env: production

# Web server ports
web_http_port: 80
web_https_port: 443

# Log rotation
logrotate_enabled: true
logrotate_retention_days: 30
logrotate_compress: true

# Backup configuration (not yet deployed)
app_backup_enabled: false
app_backup_dir: /backup/apps
app_backup_retention_days: 30

# Current server status
app_servers:
  re-db:
    tailscale_ip: 100.92.26.38
    public_ip: 208.87.128.115
    ipv6: 2602:ff16:3:0:1:446:0:1
    uptime_days: 47
    services:
      quantyra:
        app_blue:
          service: quantyra-app-blue.service
          port: 8001
          status: running
        app_green:
          service: quantyra-app-green.service
          port: 8002
          status: standby
        scheduler:
          service: quantyra-scheduler.service
          status: running
        asynqmon:
          service: quantyra-asynqmon.service
          port: 9090
          status: running
        workers:
          - service: quantyra-worker-ingest.service
            mode: ingest
            concurrency: 8
          - service: quantyra-worker-maintenance.service
            mode: maintenance
            concurrency: 4
          - service: quantyra-worker-media.service
            mode: media
            concurrency: 6
          - service: quantyra-worker-mls-api.service
            mode: mls-api
            concurrency: 1
      caddy:
        service: caddy.service
        ports: [80, 443]
        status: running
    domains:
      - quantyra.io
      - lzrcdn.com
      - media.lzrcdn.com
    app_dir: /opt/quantyra-datalayer
    secrets_file: /opt/quantyra-datalayer/secrets.env

  re-node-02:
    tailscale_ip: 100.89.130.19
    public_ip: 23.227.173.245
    ipv6: 2602:ff16:3:1299::1
    uptime_days: 63
    services: {}
    status: idle
    note: "No application services running. Ready for deployment."