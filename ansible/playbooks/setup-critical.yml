---
# Quick fixes for critical issues
# Run this first to address security and backup gaps

- name: Fix SSH hardening on router-02
  hosts: router-02
  become: yes
  tasks:
    - name: Check current SSH config
      command: grep "^PermitRootLogin" /etc/ssh/sshd_config
      register: ssh_config
      changed_when: false

    - name: Fix PermitRootLogin
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin\s+yes'
        line: 'PermitRootLogin prohibit-password'
        backup: yes
      when: "'PermitRootLogin yes' in ssh_config.stdout"
      notify: Restart SSH

    - name: Ensure password authentication is disabled
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: 'PasswordAuthentication no'
      notify: Restart SSH

  handlers:
    - name: Restart SSH
      systemd:
        name: ssh
        state: restarted

- name: Create backup directories
  hosts: db_servers
  become: yes
  tasks:
    - name: Create backup directories
      file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      loop:
        - /backup
        - /backup/pgbackrest
        - /backup/redis
        - /backup/configs

- name: Deploy backup scripts
   hosts: db_servers
   become: yes
   tasks:
     - name: Copy PostgreSQL backup script
       copy:
         src: "{{ playbook_dir }}/../../backups/scripts/postgres_backup.sh"
         dest: /usr/local/bin/postgres_backup.sh
         owner: root
         group: root
         mode: '0755'

    - name: Copy S3 sync script
      copy:
        src: "{{ playbook_dir }}/../../backups/scripts/sync_to_s3.sh"
        dest: /usr/local/bin/sync_to_s3.sh
        owner: root
        group: root
        mode: '0755'

    - name: Copy pgBackRest config
      copy:
        src: "{{ playbook_dir }}/../../backups/configs/pgbackrest.conf"
        dest: /etc/pgbackrest.conf
        owner: postgres
        group: postgres
        mode: '0640'

- name: Install HAProxy exporter on routers
   hosts: haproxy
   become: yes
   tasks:
    - name: Check if HAProxy exporter is installed
      stat:
        path: /usr/local/bin/haproxy_exporter
      register: haproxy_exporter

    - name: Download HAProxy exporter
      get_url:
        url: "https://github.com/prometheus/haproxy_exporter/releases/download/v0.15.0/haproxy_exporter-0.15.0.linux-amd64.tar.gz"
        dest: /tmp/haproxy_exporter.tar.gz
      when: not haproxy_exporter.stat.exists
      register: download

    - name: Extract HAProxy exporter
      unarchive:
        src: /tmp/haproxy_exporter.tar.gz
        dest: /tmp
        remote_src: yes
      when: download.changed

    - name: Install HAProxy exporter binary
      copy:
        src: /tmp/haproxy_exporter-0.15.0.linux-amd64/haproxy_exporter
        dest: /usr/local/bin/haproxy_exporter
        owner: root
        group: root
        mode: '0755'
        remote_src: yes
      when: download.changed

    - name: Create haproxy-exporter systemd service
      copy:
        content: |
          [Unit]
          Description=HAProxy Exporter
          After=network.target

          [Service]
          Type=simple
          User=root
          ExecStart=/usr/local/bin/haproxy_exporter --haproxy.scrape-uri=http://localhost:8405/metrics
          Restart=on-failure

          [Install]
          WantedBy=multi-user.target
        dest: /etc/systemd/system/haproxy_exporter.service
        owner: root
        group: root
        mode: '0644'

    - name: Enable and start haproxy-exporter
      systemd:
        name: haproxy_exporter
        enabled: yes
        state: started
        daemon_reload: yes

- name: Configure backup cron jobs
   hosts: db_servers
   become: yes
   tasks:
     - name: Add PostgreSQL backup cron (daily diff)
       cron:
         name: "PostgreSQL backup (daily diff)"
         minute: "0"
         hour: "2"
         job: "/usr/local/bin/postgres_backup.sh diff >> /var/log/backup.log 2>&1"
         user: root

     - name: Add PostgreSQL backup cron (weekly full)
       cron:
         name: "PostgreSQL backup (weekly full)"
         minute: "0"
         hour: "2"
         weekday: "0"
         job: "/usr/local/bin/postgres_backup.sh full >> /var/log/backup.log 2>&1"
         user: root

- name: Verify all services
  hosts: all
  become: yes
  tasks:
    - name: Check backup directories
      stat:
        path: /backup
      register: backup_dir
      when: inventory_hostname in groups['db_servers']

    - name: Assert backup directory exists
      assert:
        that:
          - backup_dir.stat.exists
        fail_msg: "Backup directory not found"
        success_msg: "Backup directory exists"
      when: inventory_hostname in groups['db_servers']