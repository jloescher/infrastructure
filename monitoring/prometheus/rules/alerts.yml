groups:
  - name: node_alerts
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 < 15
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk {{ $labels.mountpoint }} has only {{ $value }}% free space"

      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 < 5
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk space on {{ $labels.instance }}"
          description: "Disk {{ $labels.mountpoint }} has only {{ $value }}% free space - immediate action required"

      - alert: HighDiskIO
        expr: irate(node_disk_io_time_seconds_total[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk I/O on {{ $labels.instance }}"
          description: "Disk {{ $labels.device }} has high I/O wait time"

      - alert: NodeDown
        expr: up{job="node_exporter"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Node {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} has been unreachable for more than 1 minute"

  - name: postgresql_alerts
    rules:
      - alert: PostgreSQLDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down on {{ $labels.instance }}"
          description: "PostgreSQL instance {{ $labels.instance }} is not responding"

      - alert: PostgreSQLTooManyConnections
        expr: (pg_stat_activity_count / pg_settings_max_connections) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Too many PostgreSQL connections on {{ $labels.instance }}"
          description: "{{ $value }}% of max connections used on {{ $labels.instance }}"

      - alert: PostgreSQLReplicationLag
        expr: pg_replication_lag_seconds > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL replication lag on {{ $labels.instance }}"
          description: "Replication lag is {{ $value }} seconds"

      - alert: PostgreSQLReplicationLagCritical
        expr: pg_replication_lag_seconds > 300
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical PostgreSQL replication lag on {{ $labels.instance }}"
          description: "Replication lag is {{ $value }} seconds - immediate attention required"

      - alert: PostgreSQLDeadlocks
        expr: rate(pg_stat_database_deadlocks[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL deadlocks detected on {{ $labels.instance }}"
          description: "{{ $value }} deadlocks per second detected"

      - alert: PostgreSQLSlowQueries
        expr: rate(pg_stat_activity_duration_seconds{state="active"}[5m]) > 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow PostgreSQL queries on {{ $labels.instance }}"
          description: "Queries taking longer than 10 seconds detected"

      - alert: PatroniClusterDegraded
        expr: patroni_health == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Patroni cluster degraded on {{ $labels.instance }}"
          description: "Patroni member {{ $labels.instance }} is not healthy"

  - name: redis_alerts
    rules:
      - alert: RedisDown
        expr: redis_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis is down on {{ $labels.instance }}"
          description: "Redis instance {{ $labels.instance }} is not responding"

      - alert: RedisMemoryHigh
        expr: (redis_memory_used_bytes / redis_memory_max_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis memory usage high on {{ $labels.instance }}"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}"

      - alert: RedisConnectionsHigh
        expr: (redis_connected_clients / redis_config_maxclients) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Redis connections high on {{ $labels.instance }}"
          description: "{{ $value }}% of max connections used"

      - alert: RedisReplicationBroken
        expr: delta(redis_connected_slaves[5m]) < 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Redis replication broken on {{ $labels.instance }}"
          description: "Number of connected replicas has decreased"

  - name: haproxy_alerts
    rules:
      - alert: HAProxyDown
        expr: haproxy_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "HAProxy is down on {{ $labels.instance }}"
          description: "HAProxy instance {{ $labels.instance }} is not responding"

      - alert: HAProxyBackendDown
        expr: haproxy_backend_active_servers == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "HAProxy backend {{ $labels.backend }} has no active servers"
          description: "All backend servers are down for {{ $labels.backend }}"

      - alert: HAProxyBackendHealthDegraded
        expr: haproxy_backend_active_servers / haproxy_backend_servers < 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "HAProxy backend {{ $labels.backend }} health degraded"
          description: "Less than 50% of backend servers are active"

      - alert: HAProxyHighConnectionRate
        expr: rate(haproxy_frontend_connections_total[5m]) > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High connection rate on HAProxy frontend {{ $labels.frontend }}"
          description: "Connection rate is {{ $value }} per second"

  - name: etcd_alerts
    rules:
      - alert: EtcdDown
        expr: up{job="etcd"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "etcd is down"
          description: "etcd instance {{ $labels.instance }} is not responding"

      - alert: EtcdHighFsyncDuration
        expr: histogram_quantile(0.99, rate(etcd_disk_wal_fsync_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High etcd fsync duration"
          description: "etcd WAL fsync duration is {{ $value }}s"

      - alert: EtcdDBSizeHigh
        expr: etcd_mvcc_db_total_size_in_bytes / (8 * 1024 * 1024 * 1024) > 0.8
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "etcd database size high"
          description: "etcd DB size is {{ $value }}% of quota"

  - name: backup_alerts
    rules:
      - alert: BackupNotRun
        expr: time() - pgbackrest_backup_timestamp_seconds > 86400 * 2
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "PostgreSQL backup not run recently"
          description: "Last backup was more than 2 days ago"

      - alert: BackupFailed
        expr: pgbackrest_backup_status == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL backup failed"
          description: "Backup operation failed on {{ $labels.instance }}"