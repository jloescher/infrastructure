[global]
# Repository settings
repo1-path=/backup/pgbackrest
repo1-retention-full=4
repo1-retention-diff=30
repo1-retention-archive-type=full
repo1-retention-archive=4

# Backup settings
process-max=4
compress-type=lz4
compress-level=3

# Archive settings
archive-async=y
archive-push-queue-max=1GiB

# Logging
log-level-console=info
log-level-file=detail
log-path=/var/log/pgbackrest

# Recovery settings
recovery-option=recovery_target_action=promote
delta=y

# S3 Repository (optional - uncomment and configure)
# repo2-type=s3
# repo2-s3-bucket=your-backup-bucket
# repo2-s3-endpoint=s3.amazonaws.com
# repo2-s3-region=us-east-1
# repo2-path=/pgbackrest
# repo2-retention-full=4
# repo2-retention-diff=30

# Encryption (recommended)
# repo1-cipher-type=aes-256-cbc
# repo1-cipher-pass=<your-encryption-password>

[main]
# PostgreSQL stanza configuration
pg1-path=/var/lib/postgresql/18/main
pg1-port=5432
pg1-user=postgres

# Patroni integration
pg1-host=$(hostname)
pg1-host-cmd=/usr/bin/sudo -u postgres /usr/bin/pgbackrest

# Backup schedule recommendations (set in cron):
# Full backup:  Weekly on Sunday at 2 AM
# Diff backup:  Daily at 2 AM (except Sunday)
# Example cron entries:
# 0 2 * * 0 /usr/local/bin/postgres_backup.sh full
# 0 2 * * 1-6 /usr/local/bin/postgres_backup.sh diff